trigger: none
pr: none

parameters:
  - name: stage
    type: string
    default: prod
  - name: mode
    type: string
    default: dry-run
    values:
      - dry-run
      - plan
      - apply
  - name: confirm
    type: string
    default: "false"
  - name: parameterOverrides
    type: string
    default: "{}"

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self

  - task: NodeTool@0
    inputs:
      versionSpec: "22.x"

  - script: corepack enable
    displayName: Enable corepack

  - script: pnpm install --frozen-lockfile
    displayName: Install dependencies

  - script: node ./scripts/run-azure-deploy.mjs
    name: deploy
    displayName: Run shared deploy orchestration
    env:
      PP_DEPLOY_PROJECT_PATH: $(Build.SourcesDirectory)
      PP_DEPLOY_STAGE: ${{ parameters.stage }}
      PP_DEPLOY_MODE: ${{ parameters.mode }}
      PP_DEPLOY_CONFIRM: ${{ parameters.confirm }}
      PP_DEPLOY_PARAMETER_OVERRIDES: ${{ parameters.parameterOverrides }}
      PP_TENANT_DOMAIN: $(PP_TENANT_DOMAIN)

  - script: echo $(deploy.PP_DEPLOY_SQL_ENDPOINT)
    displayName: Use a resolved deploy binding
