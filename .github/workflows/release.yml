name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pp/cli build
      - run: pnpm --filter @pp/cli publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: node22-win-x64
            artifact: pp.exe
          - os: macos-latest
            target: node22-macos-arm64
            artifact: pp-macos-arm64
          - os: macos-13
            target: node22-macos-x64
            artifact: pp-macos-x64
          - os: ubuntu-latest
            target: node22-linux-x64
            artifact: pp-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pp/cli build:standalone
      - run: npx @yao-pkg/pkg packages/cli/dist-standalone/index.cjs --target ${{ matrix.target }} --output packages/cli/dist-bin/${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact }}
          path: packages/cli/dist-bin/${{ matrix.artifact }}

  build-vsix:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter vscode-pp build
      - run: npx @vscode/vsce package --no-dependencies
        working-directory: packages/vscode
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: packages/vscode/*.vsix

  create-release:
    needs: [publish-npm, build-binaries, build-vsix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --generate-notes \
            release-artifacts/*
