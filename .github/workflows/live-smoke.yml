name: Live Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: live-smoke
  cancel-in-progress: false

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PP_CONFIG_DIR: ./.tmp/pp-smoke-config
      PP_SMOKE_ENV: smoke
      PP_SMOKE_PROFILE: smoke-ci
      PP_SMOKE_URL: ${{ secrets.PP_SMOKE_URL }}
      PP_SMOKE_TENANT_ID: ${{ secrets.PP_SMOKE_TENANT_ID }}
      PP_SMOKE_CLIENT_ID: ${{ secrets.PP_SMOKE_CLIENT_ID }}
      PP_SMOKE_CLIENT_SECRET: ${{ secrets.PP_SMOKE_CLIENT_SECRET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate live smoke configuration
        run: |
          test -n "$PP_SMOKE_URL" || { echo "Missing required secret: PP_SMOKE_URL"; exit 1; }
          test -n "$PP_SMOKE_TENANT_ID" || { echo "Missing required secret: PP_SMOKE_TENANT_ID"; exit 1; }
          test -n "$PP_SMOKE_CLIENT_ID" || { echo "Missing required secret: PP_SMOKE_CLIENT_ID"; exit 1; }
          test -n "$PP_SMOKE_CLIENT_SECRET" || { echo "Missing required secret: PP_SMOKE_CLIENT_SECRET"; exit 1; }

      - name: Bootstrap smoke config
        run: |
          rm -rf "$PP_CONFIG_DIR"
          pnpm exec tsx packages/cli/src/index.ts auth profile add-client-secret \
            --name "$PP_SMOKE_PROFILE" \
            --tenant-id "$PP_SMOKE_TENANT_ID" \
            --client-id "$PP_SMOKE_CLIENT_ID" \
            --secret-env PP_SMOKE_CLIENT_SECRET \
            --resource "$PP_SMOKE_URL" \
            --config-dir "$PP_CONFIG_DIR"
          pnpm exec tsx packages/cli/src/index.ts env add \
            --name "$PP_SMOKE_ENV" \
            --url "$PP_SMOKE_URL" \
            --profile "$PP_SMOKE_PROFILE" \
            --config-dir "$PP_CONFIG_DIR"

      - name: Run live smoke lane
        run: pnpm smoke:live
