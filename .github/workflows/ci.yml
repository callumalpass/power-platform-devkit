name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Verify published package contents
        run: npm pack --dry-run

  windows-package:
    needs: test
    runs-on: windows-latest
    outputs:
      version: ${{ steps.package_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@10.7.0 --activate

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Read package version
        id: package_version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build SEA executables
        shell: pwsh
        run: pnpm run build:sea

      - name: Install Inno Setup
        shell: pwsh
        run: winget install --id JRSoftware.InnoSetup -e -s winget --accept-package-agreements --accept-source-agreements --disable-interactivity

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) {
            $iscc = Join-Path $env:ProgramFiles 'Inno Setup 6\ISCC.exe'
          }
          if (-not (Test-Path $iscc)) {
            throw 'ISCC.exe not found after installing Inno Setup.'
          }
          & $iscc "/DMyAppVersion=${{ steps.package_version.outputs.version }}" "packaging/windows/pp.iss"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pp-windows-${{ github.sha }}
          path: |
            release/win32-x64/*.exe
            release/installer/*.exe
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: windows-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          name: pp-windows-${{ github.sha }}
          path: release-artifacts

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "Automated release for $tag"
          mapfile -t files < <(find release-artifacts -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found." >&2
            exit 1
          fi
          gh release upload "$tag" "${files[@]}" --clobber
