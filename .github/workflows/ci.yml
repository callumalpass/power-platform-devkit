name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Verify published package contents
        run: npm pack --dry-run

  package:
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read package version
        id: package_version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build SEA executables
        run: pnpm run build:sea

      - name: Install Inno Setup
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $paths = @(
            (Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'),
            (Join-Path $env:ProgramFiles 'Inno Setup 6\ISCC.exe')
          )
          $iscc = $paths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($iscc) {
            Write-Host "Inno Setup already installed at $iscc"
            exit 0
          }
          winget install --id JRSoftware.InnoSetup -e -s winget --accept-package-agreements --accept-source-agreements --disable-interactivity

      - name: Build installer
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $iscc = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) {
            $iscc = Join-Path $env:ProgramFiles 'Inno Setup 6\ISCC.exe'
          }
          if (-not (Test-Path $iscc)) {
            throw 'ISCC.exe not found after installing Inno Setup.'
          }
          & $iscc "/DMyAppVersion=${{ steps.package_version.outputs.version }}" "packaging/windows/pp.iss"

      - name: Create tarball
        if: matrix.platform != 'win32'
        shell: bash
        run: |
          cd release/${{ matrix.platform }}-${{ matrix.arch }}
          tar czf ../pp-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pp-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.sha }}
          path: |
            release/${{ matrix.platform }}-${{ matrix.arch }}/pp*
            release/installer/*.exe
            release/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "Automated release for $tag"
          mapfile -t files < <(find release-artifacts -type f \( -name '*.tar.gz' -o -name '*.exe' \) | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found." >&2
            exit 1
          fi
          gh release upload "$tag" "${files[@]}" --clobber
